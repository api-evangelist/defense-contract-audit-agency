description: >-
  The Defense Contract Audit Agency (DCAA), under the authority, direction,
  and control of the Under Secretary of Defense (Comptroller), provides audit
  and financial advisory services to Department of Defense and other federal
  entities responsible for acquisition and contract administration. DCAA
  publishes guidance, audit programs, and reports through its website but
  does not currently expose a public developer API.
